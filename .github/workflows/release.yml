name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -race ./...

      - name: Build
        run: |
          export BT_BUILD_VERSION=${{ github.ref_name }}
          make build
          tar -czf bt-${{ github.ref_name }}-linux-amd64.tar.gz bin/bt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            bt-${{ github.ref_name }}-linux-amd64.tar.gz
